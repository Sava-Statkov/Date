<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#d69a00">
  <title>Само още няколко нещица</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="form">
  <!-- Fixed romantic background -->
  <div class="background-layer" aria-hidden="true"></div>

  <!-- Form page content -->
  <main class="page form-page">
    <section class="form-card animate-in" aria-labelledby="form-title">
      <header class="form-header">
        <p class="form-kicker">Едва те навих..</p>
        <h1 id="form-title">ОТ СЕГА БЕЗ ИЗЛИШНИ ПРИКАЗКИ </h1>
      </header>

      <form id="date-form" action="https://api.web3forms.com/submit" method="POST" novalidate>
        <input type="hidden" name="access_key" value="8707fc64-793f-4a68-8274-8995b80c4cbd">
        <input type="hidden" name="subject" value="Нова среща със Симонка">
        <input type="hidden" name="from_name" value="Date Website">

        <!-- Question 1 -->
        <fieldset class="question" data-field-group="Activity">
          <legend>Какво ти се прави? 🫵</legend>
          <div class="option-list">
            <label class="radio-option">
              <input type="radio" name="Activity" value="Разходка" required>
              <span>Разходка</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="Activity" value="Билярд">
              <span>Билярд</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="Activity" value="Боулинг">
              <span>Боулинг</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="Activity" value="Музей">
              <span>Музей</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="Activity" value="Кино">
              <span>Кино</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="Activity" value="Обикаляне с колата">
              <span>Обикаляне с кола</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="Activity" value="Терапия за двойки??">
              <span>Фитнес</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="Activity" value="У вас / У нас">
              <span>У вас / У нас</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="Activity" value="Изненада">
              <span>Нямам претенции</span>
            </label>
          </div>
          <p class="error-message" id="activity-error" role="alert"></p>
        </fieldset>

        <!-- Question 2 -->
        <fieldset class="question" data-field-group="Food">
          <legend>Какво ти се хапва? 🍽️</legend>
          <div class="option-list">
            <label class="radio-option">
              <input type="radio" name="Food" value="Пица" required>
              <span>Пица</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="Food" value="Паста">
              <span>Паста</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="Food" value="Суши">
              <span>Суши</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="Food" value="Нещо полезно">
              <span>Нещо полезно</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="Food" value="Нещо сладко">
              <span>Нещо сладко</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="Food" value="Нямам претенции">
              <span>Сава</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="Food" value="Нямам претенции">
              <span>Нямам претенции</span>
            </label>
          </div>
          <p class="error-message" id="food-error" role="alert"></p>
        </fieldset>

        <!-- Question 3 -->
        <fieldset class="question">
          <legend>Кога ти е удобно? ⏰</legend>
          <div class="date-time-grid">
            <label class="field-label" for="date-field">
              <span>Дата</span>
              <input id="date-field" type="date" name="Date" required>
            </label>
            <label class="field-label" for="time-field">
              <span>Час</span>
              <input id="time-field" type="time" name="Time" required>
            </label>
          </div>
          <p class="error-message" id="datetime-error" role="alert"></p>
        </fieldset>

        <!-- Wallet question -->
        <fieldset class="question wallet-question" data-field-group="Wallet">
          <legend>Колко ще ми олекне портфейлът? 💸💸💸</legend>
          <div class="option-list">
            <label class="radio-option">
              <input type="radio" name="Wallet" value="Леко">
              <span>Леко</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="Wallet" value="Достатъчно" checked>
              <span>Достатъчно</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="Wallet" value="Започваш да ме притесняваш">
              <span>Започваш да ме притесняваш</span>
            </label>
          </div>
        </fieldset>

        <!-- Optional delay question -->
        <fieldset class="question" data-field-group="Delay">
          <legend>Колко време ще закъснееш? 🧐</legend>
          <div class="option-list">
            <label class="radio-option">
              <input type="radio" name="Delay" value="Няма да закъснея">
              <span>Няма да закъснея (малко вероятно)</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="Delay" value="5 минути">
              <span>15 минути</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="Delay" value="Половин час">
              <span>Половин час</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="Delay" value="Ще пиша &quot;идвам&quot; докато още съм вкъщи">
              <span>Ще започна да се оправям в часа на срещата</span>
            </label>
          </div>
        </fieldset>

        <!-- Required confirmation -->
        <fieldset class="question confirmation-question">
          <label class="checkbox-option">
            <input id="confirm-field" type="checkbox" name="Checkbox state" value="Отбелязано" required>
            <span>Ако си прочела и попълнила всичко и НЕ мислиш да ме изпържиш, отбележи тук.</span>
          </label>
          <p class="error-message" id="confirm-error" role="alert"></p>
        </fieldset>

        <p class="form-status" id="form-status" role="status" aria-live="polite"></p>

        <button class="button button-primary submit-button" type="submit">
          Изпрати
        </button>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
  <script src="form.js"></script>
</body>
</html>
