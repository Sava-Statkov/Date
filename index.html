<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#d69a00">
  <title>Искаш ли да излезеш с мен?</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="home">
  <!-- Fixed romantic background -->
  <div class="background-layer" aria-hidden="true"></div>

  <!-- First page content -->
  <main class="page page-center home-page">
    <section class="home-card animate-in" aria-labelledby="home-title">
      <img class="profile-photo" src="assets/me.png" alt="Моя снимка">

      <h1 id="home-title">Искаш ли да излезеш с мен?</h1>

      <div class="button-zone" aria-label="Избор">
        <button class="button button-primary yes-button" type="button">
          Да
        </button>
        <button class="button button-secondary no-button" type="button" aria-label="Не">
          Не
        </button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
